# vim:set ft=tmux:

# Embedded style that ensures that modules look "connected"
# when required.
set -gqF @_snk_connect_style \
  "#{?#{==:#{@sonokai_status_connect_separator},yes},,#[bg=default]}"

# There are four colors involved:
#
# - Icon
#   - fg: @sonokai_status_[module]_icon_fg [default = crust]
#   - bg: @sonokai_status_[module]_icon_bg [required]
# - Text
#   - fg: @sonokai_status_[module]_text_fg [default = foreground]
#   - bg: @sonokai_status_[module]_text_bg [default = @sonokai_status_module_text_bg]

set -ogqF "@sonokai_status_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
set -ogqF "@sonokai_status_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"

%if "#{==:#{@sonokai_status_${MODULE_NAME}_icon_bg},}"
  set -gqF "@sonokai_status_${MODULE_NAME}_icon_bg" "#{@sonokai_${MODULE_NAME}_color}"
%endif

%if "#{==:#{@sonokai_status_${MODULE_NAME}_text_bg},}"
  set -gqF @_snk_module_text_bg "#{E:@sonokai_status_module_text_bg}"
%else
  set -gqF @_snk_module_text_bg "#{@sonokai_status_${MODULE_NAME}_text_bg}"
%endif

set -gF "@sonokai_status_${MODULE_NAME}" \
  "#[fg=#{@sonokai_status_${MODULE_NAME}_icon_bg}]#{@_snk_connect_style}"
set -ag "@sonokai_status_${MODULE_NAME}" "#{E:@sonokai_status_left_separator}"

set -agF "@sonokai_status_${MODULE_NAME}" \
  "#[fg=#{@sonokai_status_${MODULE_NAME}_icon_fg},bg=#{@sonokai_status_${MODULE_NAME}_icon_bg}]#{@sonokai_${MODULE_NAME}_icon}"

set -ag "@sonokai_status_${MODULE_NAME}" "#{E:@sonokai_status_middle_separator}"

set -agF "@sonokai_status_${MODULE_NAME}" \
  "#[fg=#{@sonokai_status_${MODULE_NAME}_text_fg},bg=#{@_snk_module_text_bg}]"

set -ag "@sonokai_status_${MODULE_NAME}" "#{E:@sonokai_${MODULE_NAME}_text}"

set -agF "@sonokai_status_${MODULE_NAME}" "#[fg=#{@_snk_module_text_bg}]#{@_snk_connect_style}"
set -ag "@sonokai_status_${MODULE_NAME}" "#{E:@sonokai_status_right_separator}"

set -ug @_snk_connect_style
set -ug @_snk_module_text_bg
