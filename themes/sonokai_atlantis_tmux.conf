# vim:set ft=tmux:

# --> Sonokai (Atlantis)

# Background shades
set -ogq @snk_black "#181a1c"
set -ogq @snk_bg_dim "#24272e"
set -ogq @snk_bg0 "#2a2f38"
set -ogq @snk_bg1 "#333846"
set -ogq @snk_bg2 "#373c4b"
set -ogq @snk_bg3 "#3d4455"
set -ogq @snk_bg4 "#424b5b"

# Diff/accent backgrounds
set -ogq @snk_bg_red "#55393d"
set -ogq @snk_bg_yellow "#4e432f"
set -ogq @snk_bg_green "#394634"
set -ogq @snk_bg_blue "#354157"
set -ogq @snk_bg_purple "#463e4f"

# Foreground
set -ogq @snk_fg "#e1e3e4"

# Accent colors
set -ogq @snk_red "#ff6578"
set -ogq @snk_orange "#f69c5e"
set -ogq @snk_yellow "#eacb64"
set -ogq @snk_green "#9dd274"
set -ogq @snk_blue "#72cce8"
set -ogq @snk_purple "#ba9cf3"

# Filled (bright) variants
set -ogq @snk_filled_red "#ff6d7e"
set -ogq @snk_filled_green "#a8da7a"
set -ogq @snk_filled_blue "#82d6f0"

# Greys
set -ogq @snk_grey "#828a9a"
set -ogq @snk_grey_dim "#5a6477"
