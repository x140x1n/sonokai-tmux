# vim:set ft=tmux:

# --> Sonokai (Andromeda)

# Background shades
set -ogq @snk_black "#181a1c"
set -ogq @snk_bg_dim "#252630"
set -ogq @snk_bg0 "#2b2d3a"
set -ogq @snk_bg1 "#333648"
set -ogq @snk_bg2 "#363a4e"
set -ogq @snk_bg3 "#393e53"
set -ogq @snk_bg4 "#3f445b"

# Diff/accent backgrounds
set -ogq @snk_bg_red "#55393d"
set -ogq @snk_bg_yellow "#4e432f"
set -ogq @snk_bg_green "#394634"
set -ogq @snk_bg_blue "#354157"
set -ogq @snk_bg_purple "#463e4f"

# Foreground
set -ogq @snk_fg "#e1e3e4"

# Accent colors
set -ogq @snk_red "#fb617e"
set -ogq @snk_orange "#f89860"
set -ogq @snk_yellow "#edc763"
set -ogq @snk_green "#9ed06c"
set -ogq @snk_blue "#6dcae8"
set -ogq @snk_purple "#bb97ee"

# Filled (bright) variants
set -ogq @snk_filled_red "#ff6188"
set -ogq @snk_filled_green "#a8d872"
set -ogq @snk_filled_blue "#7dd4f0"

# Greys
set -ogq @snk_grey "#7e8294"
set -ogq @snk_grey_dim "#5a5e7a"
