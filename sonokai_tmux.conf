source -F "#{d:current_file}/themes/sonokai_#{@sonokai_flavor}_tmux.conf"

%if "#{==:#{@sonokai_status_background},default}"
  set -gF @_snk_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_snk_status_bg},fg=#{@thm_fg}"

  %hidden SNK_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@sonokai_status_background},none}"
  set -g status-style "default"
  set -g @_snk_status_bg "none"

  %hidden SNK_MESSAGE_BACKGROUND="default"
%else
  # Treat @sonokai_status_background as a format string.
  set -gF status-style "bg=#{E:@sonokai_status_background},fg=#{@thm_fg}"
  set -gF @_snk_status_bg "#{E:@sonokai_status_background}"

  %hidden SNK_MESSAGE_BACKGROUND="#{E:@sonokai_status_background}"
%endif

source -F "#{d:current_file}/status/application.conf"
source -F "#{d:current_file}/status/battery.conf"
source -F "#{d:current_file}/status/clima.conf"
source -F "#{d:current_file}/status/cpu.conf"
source -F "#{d:current_file}/status/date_time.conf"
source -F "#{d:current_file}/status/directory.conf"
source -F "#{d:current_file}/status/gitmux.conf"
source -F "#{d:current_file}/status/host.conf"
source -F "#{d:current_file}/status/kube.conf"
source -F "#{d:current_file}/status/load.conf"
source -F "#{d:current_file}/status/pomodoro_plus.conf"
source -F "#{d:current_file}/status/session.conf"
source -F "#{d:current_file}/status/uptime.conf"
source -F "#{d:current_file}/status/user.conf"
source -F "#{d:current_file}/status/weather.conf"

# messages
set -gF message-style "fg=#{@thm_teal},bg=$SNK_MESSAGE_BACKGROUND,align=centre"
set -gF message-command-style "fg=#{@thm_teal},bg=$SNK_MESSAGE_BACKGROUND,align=centre"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@sonokai_menu_selected_style}"
%endif

# panes
set -wgF pane-active-border-style "#{E:@sonokai_pane_active_border_style}"
set -wgF pane-border-style "#{E:@sonokai_pane_border_style}"

%if "#{==:#{@sonokai_pane_status_enabled},yes}"
  # "internal" variables are kept as @_snk_p_.*
  # and then unset at the end.
  set -gq @_snk_p_left "" # the content on the left, usually a separator
  set -gq @_snk_p_middle ""
  set -gq @_snk_p_right ""
  set -gq @_snk_p_number ""
  set -gq @_snk_p_text ""

  %if "#{==:#{@sonokai_pane_default_fill},none}"
    set -g @_snk_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@sonokai_pane_left_separator}"
    set -g @_snk_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@sonokai_pane_middle_separator}"
    set -g @_snk_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@sonokai_pane_right_separator}"

    set -g @_snk_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_snk_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@sonokai_pane_default_text}"

  %elif "#{==:#{@sonokai_pane_default_fill},all}"

    set -g @_snk_p_left \
      "#[fg=#{E:@sonokai_pane_color},bg=default]#{@sonokai_pane_left_separator}"
    set -g @_snk_p_middle \
      "#[fg=#{E:@sonokai_pane_color},bg=#{E:@sonokai_pane_background_color}]#{@sonokai_pane_middle_separator}"
    set -g @_snk_p_right \
      "#[fg=#{E:@sonokai_pane_color},bg=default]#{@sonokai_pane_right_separator}"

    set -g @_snk_p_number \
      "#[fg=#{E:@sonokai_pane_background_color},bg=#{E:@sonokai_pane_color}]##{pane_index}"
    set -g @_snk_p_text \
      "#[fg=#{E:@sonokai_pane_background_color},bg=#{E:@sonokai_pane_color}]#{E:@sonokai_pane_default_text}"

  %elif "#{==:#{@sonokai_pane_default_fill},number}"

    %if "#{==:#{@sonokai_pane_number_position},left}"
      set -g @_snk_p_left \
        "#[fg=#{E:@sonokai_pane_color},bg=default]#{@sonokai_pane_left_separator}"
      set -g @_snk_p_right \
        "#[fg=#{E:@sonokai_pane_background_color},bg=default]#{@sonokai_pane_right_separator}"
    %else
      set -g @_snk_p_left \
        "#[fg=#{E:@sonokai_pane_background_color},bg=default]#{@sonokai_pane_left_separator}"
      set -g @_snk_p_right \
        "#[fg=#{E:@sonokai_pane_color},bg=default]#{@sonokai_pane_right_separator}"
    %endif

    set -g @_snk_p_middle \
      "#[fg=#{E:@sonokai_pane_color},bg=#{E:@sonokai_pane_background_color}]#{@sonokai_pane_middle_separator}"

    set -g @_snk_p_number \
      "#[fg=#{E:@sonokai_pane_background_color},bg=#{E:@sonokai_pane_color}]##{pane_index}"
    set -g @_snk_p_text \
      "#[fg=#{E:@sonokai_pane_color},bg=#{E:@sonokai_pane_background_color}]#{E:@sonokai_pane_default_text}"

  %endif

  %if "#{==:#{@sonokai_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_snk_p_left}#{E:@_snk_p_number}#{E:@_snk_p_middle} #{E:@_snk_p_text}#{E:@_snk_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_snk_p_left}#{E:@_snk_p_text} #{E:@_snk_p_middle}#{E:@_snk_p_number}#{E:@_snk_p_right}"
  %endif

  set -ug @_snk_p_left
  set -ug @_snk_p_middle
  set -ug @_snk_p_right
  set -ug @_snk_p_number
  set -ug @_snk_p_text
%endif

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

%if "#{==:#{@sonokai_window_status_style},basic}"

  set -gq @sonokai_window_left_separator " "
  set -gq @sonokai_window_middle_separator " "
  set -gq @sonokai_window_right_separator " "

  # Status module separators for basic style
  set -gq @sonokai_status_left_separator ""
  set -gq @sonokai_status_middle_separator ""
  set -gq @sonokai_status_right_separator " "

%elif "#{==:#{@sonokai_window_status_style},rounded}"

  set -gq @sonokai_window_left_separator "#[fg=#{@sonokai_window_number_color},bg=#{@_snk_status_bg}]"
  set -gq @sonokai_window_middle_separator " "
  set -gq @sonokai_window_right_separator "#[fg=#{@sonokai_window_text_color},bg=#{@_snk_status_bg}]"
  set -gq @sonokai_window_current_left_separator "#[fg=#{@sonokai_window_current_number_color},bg=#{@_snk_status_bg}]"
  set -gq @sonokai_window_current_right_separator "#[fg=#{@sonokai_window_current_text_color},bg=#{@_snk_status_bg}]"

  # Status module separators for rounded style
  set -gq @sonokai_status_left_separator ""
  set -gq @sonokai_status_middle_separator ""
  set -gq @sonokai_status_right_separator ""

%elif "#{==:#{@sonokai_window_status_style},slanted}"

  set -gq @sonokai_window_left_separator "#[fg=#{@_snk_status_bg},reverse]#[none]"

  %if "#{==:#{@sonokai_window_number_position},left}"
    set -gq @sonokai_window_middle_separator "#[fg=#{@sonokai_window_number_color},bg=#{@sonokai_window_text_color}]"
    set -gq @sonokai_window_current_middle_separator \
      "#[fg=#{@sonokai_window_current_number_color},bg=#{@sonokai_window_current_text_color}]"
  %else
    set -gq @sonokai_window_middle_separator " #[fg=#{@sonokai_window_number_color},bg=#{@sonokai_window_text_color}]"
    set -gq @sonokai_window_current_middle_separator \
      " #[fg=#{@sonokai_window_current_number_color},bg=#{@sonokai_window_current_text_color}]"
  %endif

  set -gq @sonokai_window_right_separator "#[fg=#{@_snk_status_bg},reverse]█#[none]"
  # Status module separators for slanted style
  set -gq @sonokai_status_left_separator ""
  set -gq @sonokai_status_middle_separator ""
  set -gq @sonokai_status_right_separator "█"
%endif

# DO NOT USE -o IN YOUR OWN CONFIGURATION
set -ogqF @sonokai_window_current_left_separator "#{@sonokai_window_left_separator}"
set -ogqF @sonokai_window_current_middle_separator "#{@sonokai_window_middle_separator}"
set -ogqF @sonokai_window_current_right_separator "#{@sonokai_window_right_separator}"

# window status
%if "#{!=:#{@sonokai_window_status_style},none}"
  set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
  set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"

   %if "#{==:#{@sonokai_window_flags},icon}"
    set -gqF @_snk_w_flags "#{E:@sonokai_window_flags_icon_format}"
  %elif "#{==:#{@sonokai_window_flags},text}"
    set -gq @_snk_w_flags "#F"
  %else
    set -gq @_snk_w_flags ""
  %endif

  set -g @_snk_w_number_style "#[fg=#{@thm_crust},bg=#{@sonokai_window_number_color}]"
  set -g @_snk_w_text_style "#[fg=#{@thm_fg},bg=#{@sonokai_window_text_color}]"
  %if "#{==:#{@sonokai_window_number_position},left}"
    %if "#{==:#{@sonokai_window_status_style},rounded}"
      set -gF window-status-format \
        "#{E:@sonokai_window_left_separator}#{E:@_snk_w_number_style}#{@sonokai_window_number}"
      set -agF window-status-format "#{E:@sonokai_window_middle_separator}"
      set -agF window-status-format \
        "#{E:@_snk_w_text_style}#{@sonokai_window_text}#{@_snk_w_flags}#{E:@sonokai_window_right_separator}"
    %else
      set -gF window-status-format \
        "#{E:@_snk_w_number_style}#{E:@sonokai_window_left_separator}#{@sonokai_window_number}"
      set -agF window-status-format "#{E:@sonokai_window_middle_separator}"
      set -agF window-status-format \
        "#{E:@_snk_w_text_style}#{@sonokai_window_text}#{@_snk_w_flags}#{E:@sonokai_window_right_separator}"
    %endif
  %else
    set -gF window-status-format \
      "#{E:@_snk_w_text_style}#{E:@sonokai_window_left_separator}#{E:@_snk_w_text_style}#{@sonokai_window_text}#{@_snk_w_flags}"
    set -agF window-status-format "#{E:@sonokai_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_snk_w_number_style} #{@sonokai_window_number}#{E:@sonokai_window_right_separator}"
  %endif

  # =======================================
  # And do the same for the current window.
  # =======================================

  set -g @_snk_w_number_style "#[fg=#{@thm_crust},bg=#{@sonokai_window_current_number_color}]"
  set -g @_snk_w_text_style "#[fg=#{@thm_fg},bg=#{@sonokai_window_current_text_color}]"
  %if "#{==:#{@sonokai_window_number_position},left}"
    %if "#{==:#{@sonokai_window_status_style},rounded}"
      set -gF window-status-current-format \
        "#{E:@sonokai_window_current_left_separator}#{E:@_snk_w_number_style}#{@sonokai_window_current_number}"
      set -agF window-status-current-format "#{E:@sonokai_window_current_middle_separator}"
      set -agF window-status-current-format \
        "#{E:@_snk_w_text_style}#{@sonokai_window_current_text}#{@_snk_w_flags}#{E:@sonokai_window_current_right_separator}"
    %else
      set -gF window-status-current-format \
        "#{E:@_snk_w_number_style}#{E:@sonokai_window_current_left_separator}#{@sonokai_window_current_number}"
      set -agF window-status-current-format "#{E:@sonokai_window_current_middle_separator}"
      set -agF window-status-current-format \
        "#{E:@_snk_w_text_style}#{@sonokai_window_current_text}#{@_snk_w_flags}#{E:@sonokai_window_current_right_separator}"
    %endif
  %else
    set -gF window-status-current-format \
      "#{E:@_snk_w_text_style}#{E:@sonokai_window_current_left_separator}#{E:@_snk_w_text_style}#{@sonokai_window_current_text}#{@_snk_w_flags}"
    set -agF window-status-current-format "#{E:@sonokai_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_snk_w_number_style} #{@sonokai_window_current_number}#{E:@sonokai_window_current_right_separator}"
  %endif


  # Cleanup (unset) all of the internal variables.
  set -ug @_snk_w_number_style
  set -ug @_snk_w_text_style
  set -ug @_snk_w_flags
%endif

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@thm_surface_0},bold"
set -gF clock-mode-colour "#{@thm_blue}"
