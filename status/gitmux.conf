# vim:set ft=tmux:
%hidden MODULE_NAME="gitmux"

# Requires https://github.com/arl/gitmux
set -ogq "@sonokai_${MODULE_NAME}_icon" "󰊢 "
set -ogqF "@sonokai_${MODULE_NAME}_color" "#{E:@snk_blue}"
set -gq "@sonokai_${MODULE_NAME}_text" ' #(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}")'

source -F "#{d:current_file}/../utils/status_module.conf"
