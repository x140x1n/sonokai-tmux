# vim:set ft=tmux:
%hidden MODULE_NAME="kube"

# Requires https://github.com/jonmosco/kube-tmux

set -ogq "@sonokai_${MODULE_NAME}_icon" "󱃾 "
set -ogqF "@sonokai_${MODULE_NAME}_color" "#{E:@thm_blue}"
set -ogqF "@sonokai_kube_context_color" "#{E:@thm_red}"
set -ogqF "@sonokai_kube_namespace_color" "#{E:@thm_sky}"
set -ogq "@sonokai_${MODULE_NAME}_text" \
   " #{l:#[fg=#{@sonokai_kube_context_color}]#{kubectx_context}#[fg=default]:#[fg=#{@sonokai_kube_namespace_color}]#{kubectx_namespace}}"

source -F "#{d:current_file}/../utils/status_module.conf"
